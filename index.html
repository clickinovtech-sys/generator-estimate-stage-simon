<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>

<body style="background-color: white;font-size: 18px;margin-left: 20%; margin-right: 20%;">
    <h1><img src="logo-final-black 1 (2).png" alt=""></h1>
    <h2 class="first-title">Acheteur :</h2>
    <div class="ligne">
        <div class="gauche">
            <h3>Information de l'entreprise :</h3>
            <label class="a" for="Nom de l'entreprise">Nom de l'entreprise :</label>
            <br><input class="basique" type="text" name="Nom de l'entreprise" id="Nom de l'entreprise">
            <br><label class="a" for="SIRET">SIRET :</label>
            <br><input class="basique" type="text" name="SIRET" id="SIRET">
            <br><label class="a" for="Adresse email de l'entreprise">Adresse email de l'entreprise :</label>
            <br><input class="basique" type="email" name="Adresse email de l'entreprise" id="Adresse email de l'entreprise">
        </div>
    <div class="separateur"></div>
        <div class="droite">
            <h3>Information de contact :</h3>
            <label class="a" for="Nom du contact">Nom du contact :</label>
            <br><input class="basique" type="text" name="Nom du contact" id="Nom du contact">
            <br><label class="a" for="Adresse email du contact">Adresse email du contact :</label>
            <br><input class="basique" type="email" name="Adresse email du contact" id="Adresse email du contact">
            <h4 style="margin-block-end: 0px;">Adresse :</h4>
            <label class="a" for="Rue">Rue :</label>
            <br><input class="basique" type="text" name="Rue" id="Rue">
            <br><label class="a" for="Ville">Ville :</label>
            <br><input class="basique" type="text" name="Ville" id="Ville">
            <br><label class="a" for="Pays">Pays :</label>
            <br><input class="basique" type="text" name="Pays" id="Pays">
        </div>
    </div>
    <br>
    <br>
    <h2 class="first-title">Ligne de produits :</h2>
    <div class="er">
        <div class="first">
            <label class="a" for="Produit">Produit :</label>
            <br><input class="basique" type="text" name="Produit" id="Produit">
        </div>
        <div class="separateur"></div>
        <div class="second">
            <label class="a" for="Quantité">Quantité :</label>
            <br><input class="basique" type="text" name="Quantité" id="Quantité">
        </div>
        <div class="separateur"></div>
        <div class="third">
            <label class="a" for="Prix unitaire">Prix unitaire :</label>
            <br><input class="basique" type="text" name="Prix unitaire" id="Prix unitaire">
        </div>
    </div>
        <div>
            <input class="bouton" type="button" value="Ajouter un produit" />
        </div>
       
</body>
